<!doctype html>
<html lang="fi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Asemakartta</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; }
    #topbar {
      padding: 10px;
      display: flex;
      gap: 10px;
      align-items: center;
      border-bottom: 1px solid #e5e5e5;
    }
    #map { height: calc(100vh - 52px); }
    input[type="text"] { width: 360px; max-width: 60vw; padding: 8px; }
    .hint { color: #666; font-size: 12px; }
  </style>
</head>
<body>

<div id="topbar">
  <input id="search" type="text" placeholder="Hae asemaa (esim. Helsinki tai HKI)..." />
  <button id="clear">Näytä kaikki</button>
  <label>
    <input id="toggleLabels" type="checkbox" checked />
    Näytä nimet
  </label>
  <span class="hint">Vinkki: voit hakea nimen tai lyhytkoodin perusteella.</span>
</div>

<div id="map"></div>

<script
  src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
  integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
  crossorigin=""
></script>

<script>
  // 1) Kartta
  const map = L.map('map').setView([64.5, 26.0], 5); // Suomi

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 18,
    attribution: '&copy; OpenStreetMap'
  }).addTo(map);

  // 2) Asemadata ja markerit
  const API_URL = 'https://rata.digitraffic.fi/api/v1/metadata/stations';
  const markers = []; // { data, marker, tooltip }

  let labelsVisible = true;

  function normalize(s) {
    return (s || '').toString().trim().toLowerCase();
  }

  function setLabelsVisible(visible) {
    labelsVisible = visible;
    markers.forEach(m => {
      if (visible) {
        m.marker.openTooltip();
      } else {
        m.marker.closeTooltip();
      }
    });
  }

  function showOnly(predicateFn) {
    markers.forEach(m => {
      const shouldShow = predicateFn(m.data);
      if (shouldShow) {
        if (!map.hasLayer(m.marker)) m.marker.addTo(map);
      } else {
        if (map.hasLayer(m.marker)) map.removeLayer(m.marker);
      }
    });
  }

  function fitToVisible() {
    const visible = markers.filter(m => map.hasLayer(m.marker));
    if (visible.length === 0) return;
    const group = L.featureGroup(visible.map(v => v.marker));
    map.fitBounds(group.getBounds().pad(0.2));
  }

  async function loadStations() {
    // Digitraffic suosittelee tunnisteheaderia (älä lähetä henkilötietoja).
    // Tämä on hyvä käytäntö kuorman ja ongelmatilanteiden selvittelyyn.    });

    if (!res.ok) throw new Error('Asemien haku epäonnistui: ' + res.status);
    const data = await res.json();

    data.forEach(st => {
      // Oletus: st.latitude / st.longitude ja st.stationName / st.stationShortCode
      if (st.latitude == null || st.longitude == null) return;

      const label = `${st.stationName} (${st.stationShortCode})`;
      const marker = L.circleMarker([st.latitude, st.longitude], {
        radius: 5,
        color: '#1f6feb',
        fillColor: '#1f6feb',
        fillOpacity: 0.85,
        weight: 1
      });

      marker.bindPopup(`<b>${st.stationName}</b><br/>Koodi: ${st.stationShortCode}<br/>Tyyppi: ${st.stationType || ''}`);

      // "Datalabel": Leaflet tooltip, permanent = aina näkyvä
      marker.bindTooltip(label, {
        permanent: true,
        direction: 'top',
        offset: [0, -6],
        opacity: 0.9
      });

      marker.addTo(map);

      markers.push({
        data: st,
        marker
      });
    });

    setLabelsVisible(true);
    fitToVisible();
  }

  //  3) Haku: näyttää vain osuvat asemat (nimi tai lyhytkoodi)
  function applySearch(q) {
    const needle = normalize(q);
    if (!needle) {
      showOnly(() => true);
      return;
    }

    showOnly(st => {
      const name = normalize(st.stationName);
      const code = normalize(st.stationShortCode);
      return name.includes(needle) || code.includes(needle);
    });

    fitToVisible();
  }

  // UI eventit
  document.getElementById('search').addEventListener('input', e => {
    applySearch(e.target.value);
  });

  document.getElementById('clear').addEventListener('click', () => {
    document.getElementById('search').value = '';
    applySearch('');
  });

  document.getElementById('toggleLabels').addEventListener('change', e => {
    setLabelsVisible(e.target.checked);
  });

  // Käynnistys
  loadStations().catch(err => {
    console.error(err);
    alert('Asemien lataus epäonnistui. Katso konsoli.');
  });
</script>

</body>
</html>
