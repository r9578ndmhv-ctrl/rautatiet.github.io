<!doctype html>
<html lang="fi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Asemakartta + Rataverkko</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; }
    #topbar {
      padding: 10px;
      display: flex;
      gap: 10px;
      align-items: center;
      border-bottom: 1px solid #e5e5e5;
      flex-wrap: wrap;
    }
    #map { height: calc(100vh - 80px); }
    input[type="text"], select { padding: 6px; }
    .hint { color: #666; font-size: 12px; }
    button { padding: 5px 10px; }
  </style>
</head>
<body>

<div id="topbar">
  <input id="search" type="text" placeholder="Hae asemaa (nimi tai koodi)..." />
  <select id="stationSelect" multiple size="5"></select>
  <button id="clear">Näytä kaikki</button>
  <label><input id="toggleLabels" type="checkbox" checked /> Näytä nimet</label>
  <button id="increaseFont">Teksti +</button>
  <button id="decreaseFont">Teksti -</button>
  <button id="increaseMarker">Pallo +</button>
  <button id="decreaseMarker">Pallo -</button>
  <button id="changeColor">Vaihda väri</button>
  <span class="hint">Valikko ja napit hallitsevat markkereita ja nimiä.</span>
</div>

<div id="map"></div>

<script
  src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
  integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
  crossorigin=""
></script>

<script>
  const map = L.map('map').setView([64.5, 26.0], 5); // Suomi

  // 🌍 MML taustakartta WMTS
  const mmlLayer = L.tileLayer(
    'https://kartta.maanmittauslaitos.fi/avoin/wmts/maastokartta/default/GoogleMapsCompatible/{z}/{y}/{x}.png?key=YOUR_API_KEY',
    { attribution: '© Maanmittauslaitos' }
  ).addTo(map);

  // 🌐 Digitraffic asemadata
  const API_URL = 'https://rata.digitraffic.fi/api/v1/metadata/stations';
  let markers = [];
  let labelsVisible = true;
  let fontSize = 12;
  let markerRadius = 5;
  let markerColor = '#1f6feb';

  function normalize(s) { return (s||'').toString().trim().toLowerCase(); }

  function setLabelsVisible(visible) {
    labelsVisible = visible;
    markers.forEach(m => {
      if (visible) m.marker.openTooltip();
      else m.marker.closeTooltip();
    });
  }

  function showOnly(predicateFn) {
    markers.forEach(m => {
      const show = predicateFn(m.data);
      if (show) { if (!map.hasLayer(m.marker)) m.marker.addTo(map); }
      else { if (map.hasLayer(m.marker)) map.removeLayer(m.marker); }
    });
  }

  function fitToVisible() {
    const visible = markers.filter(m => map.hasLayer(m.marker));
    if (visible.length === 0) return;
    const group = L.featureGroup(visible.map(v => v.marker));
    map.fitBounds(group.getBounds().pad(0.2));
  }

  async function loadStations() {
    const res = await fetch(API_URL);
    const data = await res.json();

    // Tässä suodatetaan vain Suomi
    const fiStations = data.filter(s => s.countryCode === 'FI');

    const select = document.getElementById('stationSelect');
    fiStations.forEach(st => {
      if (st.latitude == null || st.longitude == null) return;

      const label = `${st.stationName} (${st.stationShortCode})`;
      const marker = L.circleMarker([st.latitude, st.longitude], {
        radius: markerRadius,
        color: markerColor,
        fillColor: markerColor,
        fillOpacity: 0.85,
        weight: 1
      }).bindPopup(`<b>${st.stationName}</b><br/>Koodi: ${st.stationShortCode}<br/>Tyyppi: ${st.stationType || ''}`)
        .bindTooltip(label, {permanent:true,direction:'top',offset:[0,-6],opacity:0.9, className:'stationLabel'});

      marker.addTo(map);

      markers.push({data: st, marker});

      const option = document.createElement('option');
      option.value = st.stationShortCode;
      option.textContent = label;
      select.appendChild(option);
    });

    setLabelsVisible(true);
    fitToVisible();
  }

  function applySearch(q) {
    const needle = normalize(q);
    if (!needle) { showOnly(()=>true); fitToVisible(); return; }
    showOnly(st => normalize(st.stationName).includes(needle) || normalize(st.stationShortCode).includes(needle));
    fitToVisible();
  }

  document.getElementById('search').addEventListener('input', e=>applySearch(e.target.value));
  document.getElementById('clear').addEventListener('click', ()=>{
    document.getElementById('search').value = '';
    document.getElementById('stationSelect').selectedIndex = -1;
    applySearch('');
  });
  document.getElementById('toggleLabels').addEventListener('change', e=>setLabelsVisible(e.target.checked));

  document.getElementById('stationSelect').addEventListener('change', e=>{
    const selected = Array.from(e.target.selectedOptions).map(o=>o.value);
    showOnly(st => selected.includes(st.stationShortCode));
    fitToVisible();
  });

  // Tekstin ja markerin muokkaus
  function updateMarkers() {
    markers.forEach(m => {
      m.marker.setStyle({radius: markerRadius, color: markerColor, fillColor: markerColor});
      const tooltipEl = m.marker.getTooltip();
      if (tooltipEl) tooltipEl._container.style.fontSize = fontSize+'px';
    });
  }

  document.getElementById('increaseFont').addEventListener('click', ()=>{ fontSize+=2; updateMarkers(); });
  document.getElementById('decreaseFont').addEventListener('click', ()=>{ fontSize=Math.max(6,fontSize-2); updateMarkers(); });
  document.getElementById('increaseMarker').addEventListener('click', ()=>{ markerRadius+=2; updateMarkers(); });
  document.getElementById('decreaseMarker').addEventListener('click', ()=>{ markerRadius=Math.max(2,markerRadius-2); updateMarkers(); });
  document.getElementById('changeColor').addEventListener('click', ()=>{
    markerColor = markerColor === '#1f6feb' ? '#e63946' : '#1f6feb';
    updateMarkers();
  });

  loadStations().catch(err=>console.error(err));

  // 🌐 MML Rataverkko (GeoJSON)
  async function addRailNetwork() {
    try {
      const bounds = map.getBounds();
      const params = [
        `bbox=${bounds.getWest()},${bounds.getSouth()},${bounds.getEast()},${bounds.getNorth()}`,
        `apikey=bf6fc2ec-b9fc-4ee8-b4f5-8cfc7de5467f`
      ];
      const url = `https://avoin-paikkatieto.maanmittauslaitos.fi/maastotiedot/features/v1/collections/LIITTYMAT/items?${params.join('&')}`;

      const res = await fetch(url);
      const data = await res.json();

      L.geoJSON(data, {style:{color:'#880000',weight:2}}).addTo(map);
    } catch(err) { console.error(err); }
  }

  map.on('load moveend zoomend', addRailNetwork);
  addRailNetwork();

</script>

</body>
</html>
