<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="utf-8"/>
<title>Suomen rataverkko</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html, body {
  height:100%;
  margin:0;
  font-family: Arial, sans-serif;
}

#map{
  width:100%;
  height:100%;
}

/* Himmennetään taustakarttaa */
.leaflet-tile {
  filter: grayscale(100%) brightness(1.2) contrast(0.8);
}

/* Hakulaatikko */
#controls{
  position:absolute;
  top:10px;
  left:50px;
  z-index:1000;
  background:white;
  padding:8px;
  border-radius:6px;
  box-shadow:0 0 6px rgba(0,0,0,0.3);
}

#stationSearch{
  width:220px;
  padding:4px;
}
</style>
</head>

<body>

<div id="controls">
Asema: <input id="stationSearch" placeholder="Kirjoita aseman nimi">
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([64.5, 26], 5);

/* Taustakartta */
L.tileLayer(
  "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
  {
    attribution:'© OpenStreetMap'
  }
).addTo(map);


/* RATAVERKKO (OpenRailwayMap) */
var railLayer = L.tileLayer(
  "https://{s}.tiles.openrailwaymap.org/standard/{z}/{x}/{y}.png",
  {
    attribution:'© OpenRailwayMap'
  }
);

railLayer.addTo(map);


/* ASEMAT */
var stations = [
["Helsinki",60.1719,24.9414],
["Pasila",60.1986,24.9336],
["Tampere",61.4981,23.7735],
["Turku",60.4518,22.2666],
["Oulu",65.0121,25.4651],
["Jyväskylä",62.2426,25.7473],
["Kuopio",62.8924,27.6782],
["Seinäjoki",62.7903,22.8403]
];

var markers = {};

stations.forEach(function(s){

  var m = L.circleMarker(
    [s[1],s[2]],
    {
      radius:6,
      color:"#000",
      weight:1,
      fillColor:"#ffcc00",
      fillOpacity:1
    }
  ).addTo(map);

  m.bindPopup(s[0]);

  markers[s[0].toLowerCase()] = m;

});


/* ASEMAHAKU */

var input = document.getElementById("stationSearch");

input.addEventListener("change",function(){

  var name = input.value.toLowerCase();

  if(markers[name]){

    var marker = markers[name];

    map.setView(marker.getLatLng(),10);

    marker.openPopup();

  }

});

</script>

</body>
</html>
