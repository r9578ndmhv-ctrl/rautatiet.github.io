<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Rautatiekartta</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:Arial;
}

#map{
height:88vh;
}

#controls{
padding:8px;
background:white;
border-bottom:1px solid #ccc;
}

</style>
</head>

<body>

<div id="controls">

Karttapohja:
<select id="basemap">
<option value="normal">Normaali kartta</option>
<option value="light">Haalea kartta</option>
</select>

&nbsp;&nbsp;

Asemat:
<select id="stationSelect" multiple size="4"></select>

<button onclick="toggleNames()">Nimet</button>

<button onclick="textPlus()">Teksti +</button>
<button onclick="textMinus()">Teksti -</button>

<button onclick="ballPlus()">Pallo +</button>
<button onclick="ballMinus()">Pallo -</button>

<button onclick="changeColor()">Väri</button>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([64,26],5);


/* KARTTAPOHJAT */

var normalMap = L.tileLayer(
"https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
{ attribution:"© OpenStreetMap" }
);

var lightMap = L.tileLayer(
"https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png",
{ attribution:"© Carto" }
);

normalMap.addTo(map);


/* RATAVERKKO */

var railway = L.tileLayer(
"https://{s}.tiles.openrailwaymap.org/standard/{z}/{x}/{y}.png",
{
opacity:0.85
}).addTo(map);



/* ASEMAT */

var stationsLayer = L.layerGroup().addTo(map);

var stations=[];
var textSize=14;
var ballSize=6;
var ballColor="blue";
var showNames=true;



fetch("https://rata.digitraffic.fi/api/v1/metadata/stations")
.then(r=>r.json())
.then(data=>{

data
.filter(s=>s.countryCode==="FI")
.forEach(station=>{

stations.push(station);

var option=document.createElement("option");
option.value=station.stationShortCode;
option.text=station.stationName;

document.getElementById("stationSelect").appendChild(option);

});

drawStations();

});


document.getElementById("stationSelect").addEventListener("change",drawStations);


function drawStations(){

stationsLayer.clearLayers();

var selected=[...document.getElementById("stationSelect").selectedOptions]
.map(o=>o.value);

stations
.filter(s=>selected.length==0 || selected.includes(s.stationShortCode))
.forEach(station=>{

var icon=L.divIcon({

html:`
<div style="text-align:center;color:${ballColor};font-size:${textSize}px">
<div style="
width:${ballSize*2}px;
height:${ballSize*2}px;
background:${ballColor};
border-radius:50%;
margin:auto"></div>
${showNames?station.stationName:""}
</div>
`,

className:""

});

L.marker(
[station.latitude,station.longitude],
{icon:icon}
).addTo(stationsLayer);

});

}



/* KARTTAPOHJAN VAIHTO */

document.getElementById("basemap").addEventListener("change",function(){

map.removeLayer(normalMap);
map.removeLayer(lightMap);

if(this.value==="normal"){
normalMap.addTo(map);
}

if(this.value==="light"){
lightMap.addTo(map);
}

});



/* NIMET */

function toggleNames(){
showNames=!showNames;
drawStations();
}


/* TEKSTI */

function textPlus(){
textSize+=2;
drawStations();
}

function textMinus(){
textSize-=2;
drawStations();
}


/* PALLO */

function ballPlus(){
ballSize+=2;
drawStations();
}

function ballMinus(){
ballSize-=2;
drawStations();
}


/* VÄRI */

function changeColor(){

var colors=["blue","red","green","orange","purple","black"];

ballColor=colors[Math.floor(Math.random()*colors.length)];

drawStations();

}

</script>

</body>
</html>
