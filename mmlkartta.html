<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="utf-8"/>
<title>Rautatiekartta</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:system-ui,Arial;
}

#controls{
padding:8px;
border-bottom:1px solid #ccc;
background:white;
}

#map{
height:88vh;
}

</style>
</head>

<body>

<div id="controls">

Karttapohja
<select id="basemap">
<option value="normal">Normaali</option>
<option value="light">Haalea</option>
</select>

&nbsp;&nbsp;

Asemat
<select id="stationSelect" multiple size="4"></select>

<button onclick="toggleNames()">Nimet</button>

<button onclick="textPlus()">Teksti +</button>
<button onclick="textMinus()">Teksti -</button>

<button onclick="ballPlus()">Pallo +</button>
<button onclick="ballMinus()">Pallo -</button>

<button onclick="changeColor()">Väri</button>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const map=L.map("map").setView([64.5,26],5);


/* KARTTAPOHJAT */

const normalMap=L.tileLayer(
"https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
{attribution:"© OpenStreetMap"}
);

const lightMap=L.tileLayer(
"https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png",
{attribution:"© Carto"}
);

normalMap.addTo(map);


/* RATAVERKKO */

const railway=L.tileLayer(
"https://{s}.tiles.openrailwaymap.org/standard/{z}/{x}/{y}.png",
{opacity:0.85}
).addTo(map);


/* ASEMAT */

let stations=[];
let markers=[];

let textSize=16;
let ballSize=6;
let ballColor="#1f6feb";
let showNames=true;


fetch("https://rata.digitraffic.fi/api/v1/metadata/stations")
.then(r=>r.json())
.then(data=>{

stations=data.filter(s=>s.countryCode==="FI");

const select=document.getElementById("stationSelect");

stations.forEach(st=>{

const option=document.createElement("option");
option.value=st.stationShortCode;
option.text=st.stationName;

select.appendChild(option);

});

drawStations();

});


document.getElementById("stationSelect")
.addEventListener("change",drawStations);



function drawStations(){

markers.forEach(m=>map.removeLayer(m));
markers=[];

const selected=[...document.getElementById("stationSelect").selectedOptions]
.map(o=>o.value);

stations
.filter(s=>selected.length===0 || selected.includes(s.stationShortCode))
.forEach(st=>{

const marker=L.circleMarker(
[st.latitude,st.longitude],
{
radius:ballSize,
color:ballColor,
fillColor:ballColor,
fillOpacity:0.9,
weight:1
}
).addTo(map);

const tooltip=marker.bindTooltip(
`${st.stationName} (${st.stationShortCode})`,
{
permanent:showNames,
direction:"top",
offset:[0,-6],
opacity:0.9
}
);

tooltip.getElement()?.style && (tooltip.getElement().style.fontSize=textSize+"px");

markers.push(marker);

});

}



/* KARTTAPOHJA */

document.getElementById("basemap").addEventListener("change",function(){

map.removeLayer(normalMap);
map.removeLayer(lightMap);

if(this.value==="normal") normalMap.addTo(map);
if(this.value==="light") lightMap.addTo(map);

});


/* NIMET */

function toggleNames(){

showNames=!showNames;
drawStations();

}


/* TEKSTI */

function textPlus(){

textSize+=2;
drawStations();

}

function textMinus(){

textSize-=2;
drawStations();

}


/* PALLO */

function ballPlus(){

ballSize+=2;
drawStations();

}

function ballMinus(){

ballSize-=2;
drawStations();

}


/* VÄRI */

function changeColor(){

const colors=[
"#1f6feb",
"red",
"green",
"orange",
"purple",
"black"
];

ballColor=colors[Math.floor(Math.random()*colors.length)];

drawStations();

}

</script>

</body>
</html>
