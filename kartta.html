<!doctype html>
<html lang="fi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Asemakartta</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <!-- Tom Select (alasvetovalikko, jossa monivalinta) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/css/tom-select.css" />

  <style>
    body { margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; }
    #topbar {
      padding: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      border-bottom: 1px solid #e5e5e5;
    }
    #map { height: calc(100vh - 70px); }
    .hint { color: #666; font-size: 12px; }
    select { min-width: 220px; }
    #stationSelect { min-width: 360px; }
    input[type="text"] { width: 320px; max-width: 70vw; padding: 8px; }
    button { padding: 8px 10px; cursor: pointer; }
    label { user-select: none; }
  </style>
</head>
<body>

  <div id="topbar">
    <select id="countrySelect" aria-label="Country code"></select>
