<!doctype html>
<html lang="fi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Asemakartta</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />

  <!-- Tom Select (monivalinta dropdown) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/css/tom-select.css">

  <style>
    body { margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; }
    #topbar {
      padding: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      border-bottom: 1px solid #e5e5e5;
    }
    #map { height: calc(100vh - 64px); }
    input[type="text"] { width: 360px; max-width: 60vw; padding: 8px; }
    #stationSelect { min-width: 320px; max-width: 520px; }
    .hint { color: #666; font-size: 12px; }
  </style>
</head>
<body>

<div id="topbar">
  <input id="search" type="text" placeholder="Hae asemaa (esim. Helsinki tai HKI)..." />
  <select id="stationSelect" multiple placeholder="Valitse asemia (voit valita useita)..."></select>

  <button id="clear">Näytä kaikki</button>
  <label>
    <input id="toggleLabels" type="checkbox" checked />
    Näytä nimet
  </label>
  <span class="hint">Vinkki: voit hakea nimen tai lyhytkoodin perusteella. Voit myös valita useita asemia listasta.</span>
</div>

<div id="map"></div>

<script
  src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
  integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
  crossorigin=""
></script>

<script src="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/js/tom-select.complete.min.js"></script>

<script>
  // 1) Kartta
  const map = L.map('map').setView([64.5, 26.0], 5); // Suomi

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 18,
    attribution: '&copy; OpenStreetMap'
  }).addTo(map);

  // 2) Asemadata ja markerit
  const API_URL = 'https://rata.digitraffic.fi/api/v1/metadata/stations';

  const markers = []; // { data, marker }
  let labelsVisible = true;

  // Multi-select tila
  let selectedCodes = new Set();  // valitut stationShortCode:t
  let tom = null;

  function normalize(s) {
    return (s || '').toString().trim().toLowerCase();
  }

  function setLabelsVisible(visible) {
    labelsVisible = visible;
    markers.forEach(m => {
      if (visible) m.marker.openTooltip();
      else m.marker.closeTooltip();
    });
  }

  function showOnly(predicateFn) {
    markers.forEach(m => {
      const shouldShow = predicateFn(m.data);
      if (shouldShow) {
        if (!map.hasLayer(m.marker)) m.marker.addTo(map);
      } else {
        if (map.hasLayer(m.marker)) map.removeLayer(m.marker);
      }
    });
  }

  function fitToVisible() {
    const visible = markers.filter(m => map.hasLayer(m.marker));
    if (visible.length === 0) return;
    const group = L.featureGroup(visible.map(v => v.marker));
    map.fitBounds(group.getBounds().pad(0.2));
  }

  function buildStationDropdown(stations) {
    // Täytä <select> optionit
    const sel = document.getElementById('stationSelect');
    sel.innerHTML = '';
    stations
      .slice()
      .sort((a,b) => (a.stationName || '').localeCompare((b.stationName || ''), 'fi'))
      .forEach(st => {
        const opt = document.createElement('option');
        opt.value = st.stationShortCode; // yksilöivä ja löytyvä kenttä
        opt.textContent = `${st.stationName} (${st.stationShortCode})`;
        sel.appendChild(opt);
      });

    // Luo Tom Select monivalinnalle
    if (tom) tom.destroy();
    tom = new TomSelect('#stationSelect', {
      plugins: ['remove_button', 'clear_button'],
      maxItems: null,           // sallii useamman
      closeAfterSelect: false,  // helpottaa monivalintaa
      onChange: (values) => {
        selectedCodes = new Set(values || []);
        applyFilters(); // päivitä kartan näkyvyys
      }
    });
  }

  async function loadStations() {
    const res = await fetch(API_URL);
    if (!res.ok) throw new Error('Asemien haku epäonnistui: ' + res.status);
    const data = await res.json();

    const stations = data.filter(st => st.latitude != null && st.longitude != null);

    // Luo markerit
    stations.forEach(st => {
      const label = `${st.stationName} (${st.stationShortCode})`;

      const marker = L.circleMarker([st.latitude, st.longitude], {
        radius: 5,
        color: '#1f6feb',
        fillColor: '#1f6feb',
        fillOpacity: 0.85,
        weight: 1
      });

      marker.bindPopup(
        `<b>${st.stationName}</b><br/>Koodi: ${st.stationShortCode}<br/>Tyyppi: ${st.stationType || ''}`
      );

      marker.bindTooltip(label, {
        permanent: true,
        direction: 'top',
        offset: [0, -6],
        opacity: 0.9
      });

      marker.addTo(map);

      markers.push({ data: st, marker });
    });

    // Rakenna monivalintadropdown
    buildStationDropdown(stations);

    setLabelsVisible(true);
    fitToVisible();
  }

  // 3) Filtterit: vapaa haku + monivalinta
  function applyFilters() {
    const needle = normalize(document.getElementById('search').value);

    showOnly(st => {
      const matchesSearch = !needle
        ? true
        : normalize(st.stationName).includes(needle) || normalize(st.stationShortCode).includes(needle);

      const matchesSelection = selectedCodes.size === 0
        ? true
        : selectedCodes.has(st.stationShortCode);

      // Jos sekä haku että valinta käytössä: näytetään valitut, jotka myös matchaa haun
      return matchesSearch && matchesSelection;
    });

    fitToVisible();
  }

  // UI eventit
  document.getElementById('search').addEventListener('input', () => {
    applyFilters();
  });

  document.getElementById('clear').addEventListener('click', () => {
    document.getElementById('search').value = '';
    selectedCodes = new Set();
    if (tom) tom.clear(true); // tyhjennä monivalinta
    applyFilters();
  });

  document.getElementById('toggleLabels').addEventListener('change', e => {
    setLabelsVisible(e.target.checked);
  });

  // Käynnistys
  loadStations().catch(err => {
    console.error(err);
    alert('Asemien lataus epäonnistui. Katso konsoli.');
  });
</script>

</body>
</html>
