<!doctype html>
<html lang="fi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Asemakartta</title>

  <!-- Leaflet -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

  <!-- Select2 -->
  <link
    href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css"
    rel="stylesheet"
  />
  <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    #topbar {
      padding: 10px;
      display: flex;
      gap: 12px;
      align-items: center;
      border-bottom: 1px solid #e5e5e5;
      flex-wrap: wrap;
    }

    #map {
      height: calc(100vh - 70px);
    }

    #stationSelect {
      min-width: 300px;
      max-width: 500px;
    }

    .hint {
      color: #666;
      font-size: 12px;
    }
  </style>
</head>

<body>

<div id="topbar">
  <select id="stationSelect" multiple></select>

  <button id="clear">Näytä kaikki</button>

  <label>
    <input id="toggleLabels" type="checkbox" checked />
    Näytä nimet
  </label>

  <span class="hint">Valitse yksi tai useampi asema.</span>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
  const map = L.map('map').setView([64.5, 26.0], 5);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 18,
    attribution: '&copy; OpenStreetMap'
  }).addTo(map);

  const API_URL = 'https://rata.digitraffic.fi/api/v1/metadata/stations';
  const markers = [];
  let labelsVisible = true;

  function fitToVisible() {
    const visible = markers.filter(m => map.hasLayer(m.marker));
    if (visible.length === 0) return;
    const group = L.featureGroup(visible.map(v => v.marker));
    map.fitBounds(group.getBounds().pad(0.2));
  }

  function showOnly(predicateFn) {
    markers.forEach(m => {
      const shouldShow = predicateFn(m.data);
      if (shouldShow) {
        if (!map.hasLayer(m.marker)) m.marker.addTo(map);
      } else {
        if (map.hasLayer(m.marker)) map.removeLayer(m.marker);
      }
    });
  }

  function updateTooltips() {
    markers.forEach(m => {
      if (labelsVisible && map.hasLayer(m.marker)) {
        m.marker.openTooltip();
      } else {
        m.marker.closeTooltip();
      }
    });
  }

  async function loadStations() {
    const res = await fetch(API_URL);
    const dataRaw = await res.json();

    // 🇫🇮 Vain Suomen asemat
    const data = dataRaw.filter(st => st.countryCode === "FI");

    data.sort((a, b) => a.stationName.localeCompare(b.stationName));

    data.forEach(st => {
      if (!st.latitude || !st.longitude) return;

      const label = `${st.stationName} (${st.stationShortCode})`;

      const marker = L.circleMarker([st.latitude, st.longitude], {
        radius: 6,
        color: '#1f6feb',
        fillColor: '#1f6feb',
        fillOpacity: 0.9,
        weight: 1
      });

      marker.bindPopup(`
        <b>${st.stationName}</b><br/>
        Koodi: ${st.stationShortCode}<br/>
        Tyyppi: ${st.stationType || ''}
      `);

      marker.bindTooltip(label, {
        permanent: true,
        direction: 'top',
        offset: [0, -6],
        opacity: 0.9
      });

      marker.addTo(map);

      markers.push({ data: st, marker });

      const option = new Option(
        `${st.stationName} (${st.stationShortCode})`,
        st.stationShortCode,
        false,
        false
      );
      $('#stationSelect').append(option);
    });

    fitToVisible();
    updateTooltips();
  }

  // Select2
  $('#stationSelect').select2({
    placeholder: "Valitse asema(t)...",
    allowClear: true,
    width: 'resolve'
  });

  $('#stationSelect').on('change', function () {
    const selected = $(this).val();

    if (!selected || selected.length === 0) {
      showOnly(() => true);
    } else {
      showOnly(st => selected.includes(st.stationShortCode));
    }

    fitToVisible();
    updateTooltips();
  });

  // Näytä kaikki
  document.getElementById('clear').addEventListener('click', () => {
    $('#stationSelect').val(null).trigger('change');
    showOnly(() => true);
    fitToVisible();
    updateTooltips();
  });

  // 🔹 Nimet päälle/pois
  document.getElementById('toggleLabels').addEventListener('change', e => {
    labelsVisible = e.target.checked;
    updateTooltips();
  });

  loadStations();
</script>

</body>
</html>
