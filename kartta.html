<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Rautatieasemat kartalla</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>
html, body {
  height:100%;
  margin:0;
}

#map {
  width:100%;
  height:100%;
}

.station-label {
  font-size:14px;
  font-weight:bold;
  color:black;
}
</style>
</head>

<body>

<div id="map"></div>

<script>

// MML API KEY
const apiKey = "bf6fc2ec-b9fc-4ee8-b4f5-8cfc7de5467f";

// kartta
const map = L.map('map').setView([64.5, 26], 6);

// MML taustakartta
L.tileLayer(
"https://avoin-karttakuva.maanmittauslaitos.fi/avoin/wmts/1.0.0/taustakartta/default/WGS84_Pseudo-Mercator/{z}/{y}/{x}.png?api-key=" + apiKey,
{
  attribution:"© Maanmittauslaitos",
  maxZoom:18
}).addTo(map);


// marker layer
const stationLayer = L.layerGroup().addTo(map);


// lataa CSV
Papa.parse(
"https://r9578ndmhv-ctrl.github.io/rautatiet.github.io/asemadata.csv",
{
  download:true,
  header:true,

  complete:function(results){

    results.data.forEach(function(row){

      const lat = parseFloat(row.latitude);
      const lon = parseFloat(row.longitude);
      const name = row.stationName;

      if(!lat || !lon) return;

      const marker = L.circleMarker([lat,lon],{
        radius:6,
        color:"blue",
        fillColor:"blue",
        fillOpacity:0.9
      }).addTo(stationLayer);

      marker.bindTooltip(
        "<span class='station-label'>" + name + "</span>",
        {permanent:false}
      );

    });

  }

});

</script>

</body>
</html>
